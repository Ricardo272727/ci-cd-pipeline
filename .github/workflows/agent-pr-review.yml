# Requests GitHub Copilot Code Review on pull requests opened by automation agents
# (label: automated, or branches copilot/* / semgrep/*).
#
# Runs local quality gates first (tests + JaCoCo coverage) and posts a summary comment
# so Copilot has measurable context before reviewing.
#
# Prerequisites (account / org settings):
#   - Copilot Pro, Pro+, Business, or Enterprise license
#   - Copilot code review enabled (user or org Copilot policies)
#
# Custom review criteria live in:
#   - .github/copilot-instructions.md
#   - .github/skills/code-review/SKILL.md
name: Agent PR Review

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, labeled, reopened]
    branches: [main]

env:
  JAVA_APP_DIR: java-app
  MIN_COVERAGE_PERCENT: "80"
  COPILOT_REVIEWER: copilot-pull-request-reviewer[bot]

concurrency:
  group: agent-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  quality-gates:
    name: Agent PR Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: >-
      contains(github.event.pull_request.labels.*.name, 'automated') ||
      startsWith(github.head_ref, 'copilot/') ||
      startsWith(github.head_ref, 'semgrep/') ||
      github.event.pull_request.user.login == 'github-actions[bot]'
    outputs:
      coverage_percent: ${{ steps.coverage.outputs.coverage_percent }}
      coverage_pass: ${{ steps.coverage.outputs.coverage_pass }}
      tests_pass: ${{ steps.coverage.outputs.tests_pass }}

    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run tests and measure JaCoCo line coverage
        id: coverage
        working-directory: ${{ env.JAVA_APP_DIR }}
        run: |
          set -euo pipefail
          echo "tests_pass=false" >> "$GITHUB_OUTPUT"

          mvn -B org.jacoco:jacoco-maven-plugin:0.8.12:prepare-agent test \
            org.jacoco:jacoco-maven-plugin:0.8.12:report \
            -Djacoco.destFile=target/jacoco.exec

          echo "tests_pass=true" >> "$GITHUB_OUTPUT"

          python - <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path("target/site/jacoco/jacoco.xml")
          min_cov = float(os.environ["MIN_COVERAGE_PERCENT"])
          github_output = os.environ["GITHUB_OUTPUT"]

          if not report.is_file():
              print(f"error: JaCoCo report not found at {report}", file=sys.stderr)
              sys.exit(1)

          root = ET.parse(report).getroot()
          counters = {c.get("type"): c for c in root.findall("counter")}
          line = counters.get("LINE")
          if line is None:
              print("error: LINE counter missing from JaCoCo report", file=sys.stderr)
              sys.exit(1)

          missed = int(line.get("missed", "0"))
          covered = int(line.get("covered", "0"))
          total = missed + covered
          percent = 0.0 if total == 0 else (covered / total) * 100.0
          passed = percent >= min_cov

          with open(github_output, "a", encoding="utf-8") as out:
              out.write(f"coverage_percent={percent:.2f}\n")
              out.write(f"coverage_pass={'true' if passed else 'false'}\n")
              out.write(f"lines_covered={covered}\n")
              out.write(f"lines_missed={missed}\n")

          print(f"Line coverage: {percent:.2f}% ({covered}/{total} lines)")
          if not passed:
              print(f"Coverage below minimum {min_cov}%", file=sys.stderr)
              sys.exit(1)
          PY
        env:
          MIN_COVERAGE_PERCENT: ${{ env.MIN_COVERAGE_PERCENT }}

      - name: Post quality gate summary on pull request
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const testsPass = '${{ steps.coverage.outputs.tests_pass }}' === 'true';
            const coveragePass = '${{ steps.coverage.outputs.coverage_pass }}' === 'true';
            const coveragePercent = '${{ steps.coverage.outputs.coverage_percent }}' || 'n/a';
            const linesCovered = '${{ steps.coverage.outputs.lines_covered }}' || 'n/a';
            const linesMissed = '${{ steps.coverage.outputs.lines_missed }}' || 'n/a';
            const minCoverage = '${{ env.MIN_COVERAGE_PERCENT }}';

            const body = [
              '## Agent PR quality gates',
              '',
              'Automated checks ran before requesting **Copilot Code Review**.',
              '',
              '| Gate | Result | Details |',
              '|------|--------|---------|',
              `| Unit tests (\`mvn test\`) | ${testsPass ? 'PASS' : 'FAIL'} | Spring Boot / JUnit 5 in \`java-app\` |`,
              `| Line coverage (JaCoCo) | ${coveragePass ? 'PASS' : 'FAIL'} | **${coveragePercent}%** (min **${minCoverage}%**) — ${linesCovered} covered / ${linesMissed} missed |`,
              '',
              '### Review focus for Copilot',
              '',
              '1. **Maintenance / stability** — prioritize safe, minimal changes; no regressions.',
              '2. **Repository code standards** — Java 17, Spring Boot 3.2, JUnit 5, existing package layout.',
              '3. **Reuse / DRY** — flag duplicated logic; prefer existing utilities and patterns.',
              `4. **Test coverage** — require **≥ ${minCoverage}%** line coverage on changed production code.`,
              '5. **Security** — block known vulnerabilities (Semgrep, OWASP, unsafe dependencies).',
              '',
              'See `.github/copilot-instructions.md` and `.github/skills/code-review/SKILL.md` for full criteria.',
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const marker = '<!-- agent-pr-quality-gates -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const existing = comments.find((c) =>
              c.user?.type === 'Bot' && c.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: `${marker}\n${body}`,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `${marker}\n${body}`,
              });
            }

  request-copilot-review:
    name: Request Copilot Code Review
    needs: quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      always() &&
      needs.quality-gates.result != 'cancelled' &&
      (
        contains(github.event.pull_request.labels.*.name, 'automated') ||
        startsWith(github.head_ref, 'copilot/') ||
        startsWith(github.head_ref, 'semgrep/') ||
        github.event.pull_request.user.login == 'github-actions[bot]'
      )

    steps:
      - name: Request Copilot as pull request reviewer
        uses: actions/github-script@v7
        with:
          script: |
            const reviewer = process.env.COPILOT_REVIEWER;
            const prNumber = context.payload.pull_request.number;

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers: [reviewer],
              });
              core.info(`Requested review from ${reviewer} on PR #${prNumber}`);
            } catch (error) {
              const message = String(error?.message || error);
              if (
                message.includes('already') ||
                message.includes('422') ||
                message.includes('not found')
              ) {
                core.warning(`Could not add ${reviewer}: ${message}`);
                core.warning(
                  'Ensure Copilot code review is enabled for this account or organization.',
                );
              } else {
                throw error;
              }
            }
        env:
          COPILOT_REVIEWER: ${{ env.COPILOT_REVIEWER }}

      - name: Review request summary
        if: always()
        run: |
          {
            echo "## Copilot review requested"
            echo ""
            echo "- Pull request: #${{ github.event.pull_request.number }}"
            echo "- Reviewer: \`${{ env.COPILOT_REVIEWER }}\`"
            echo "- Quality gates: **${{ needs.quality-gates.result }}**"
            echo "- Coverage: **${{ needs.quality-gates.outputs.coverage_percent }}%** (min ${{ env.MIN_COVERAGE_PERCENT }}%)"
            echo ""
            echo "Copilot will post review comments on the pull request timeline."
          } >> "$GITHUB_STEP_SUMMARY"
