# Requests GitHub Copilot Code Review on pull requests opened by automation agents
# (label: automated, or branches copilot/* / semgrep/*).
#
# Manual run (workflow_dispatch):
#   - pr_number: target pull request
#   - skip_coverage: report JaCoCo but do not fail the job below 80%
#
# Runs local quality gates first (tests + JaCoCo coverage) and posts a summary comment
# so Copilot has measurable context before reviewing.
#
# Prerequisites (account / org settings):
#   - Copilot Pro, Pro+, Business, or Enterprise license
#   - Copilot code review enabled (user or org Copilot policies)
#
# Custom review criteria live in:
#   - .github/copilot-instructions.md
#   - .github/skills/code-review/SKILL.md
name: Agent PR Review

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, labeled, reopened]
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: number
      skip_coverage:
        description: Report coverage but do not fail when below 80%
        required: false
        default: false
        type: boolean

env:
  JAVA_APP_DIR: java-app
  MIN_COVERAGE_PERCENT: "80"
  COPILOT_REVIEWER: copilot-pull-request-reviewer[bot]

concurrency:
  group: agent-pr-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  resolve-pr:
    name: Resolve pull request context
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      head_ref: ${{ steps.resolve.outputs.head_ref }}
      skip_coverage: ${{ steps.resolve.outputs.skip_coverage }}

    steps:
      - name: Resolve target pull request
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const isManual = context.eventName === 'workflow_dispatch';
            let pr;

            if (isManual) {
              const prNumber = Number(context.payload.inputs.pr_number);
              if (!Number.isInteger(prNumber) || prNumber <= 0) {
                core.setFailed('pr_number must be a positive integer');
                return;
              }

              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              pr = data;
            } else {
              pr = context.payload.pull_request;
            }

            const labels = (pr.labels || []).map((label) => label.name);
            const isAgentPr =
              labels.includes('automated') ||
              pr.head.ref.startsWith('copilot/') ||
              pr.head.ref.startsWith('semgrep/') ||
              pr.user?.login === 'github-actions[bot]';

            const shouldRun = isManual || isAgentPr;
            const skipCoverage =
              isManual &&
              (context.payload.inputs.skip_coverage === true ||
                context.payload.inputs.skip_coverage === 'true');

            core.setOutput('should_run', shouldRun ? 'true' : 'false');
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('skip_coverage', skipCoverage ? 'true' : 'false');

            if (!shouldRun) {
              core.info('Skipping: pull request does not match agent PR criteria.');
            }
            if (skipCoverage) {
              core.warning('Coverage gate is disabled for this manual run.');
            }

  quality-gates:
    name: Agent PR Quality Gates
    needs: resolve-pr
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: needs.resolve-pr.outputs.should_run == 'true'
    outputs:
      coverage_percent: ${{ steps.coverage.outputs.coverage_percent }}
      coverage_pass: ${{ steps.coverage.outputs.coverage_pass }}
      coverage_skipped: ${{ steps.coverage.outputs.coverage_skipped }}
      tests_pass: ${{ steps.coverage.outputs.tests_pass }}

    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-pr.outputs.head_sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run tests and measure JaCoCo line coverage
        id: coverage
        working-directory: ${{ env.JAVA_APP_DIR }}
        run: |
          set -euo pipefail
          echo "tests_pass=false" >> "$GITHUB_OUTPUT"
          echo "coverage_skipped=${SKIP_COVERAGE_GATE}" >> "$GITHUB_OUTPUT"

          mvn -B org.jacoco:jacoco-maven-plugin:0.8.12:prepare-agent test \
            org.jacoco:jacoco-maven-plugin:0.8.12:report \
            -Djacoco.destFile=target/jacoco.exec

          echo "tests_pass=true" >> "$GITHUB_OUTPUT"

          python - <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path("target/site/jacoco/jacoco.xml")
          min_cov = float(os.environ["MIN_COVERAGE_PERCENT"])
          skip_gate = os.environ.get("SKIP_COVERAGE_GATE", "false").lower() == "true"
          github_output = os.environ["GITHUB_OUTPUT"]

          if not report.is_file():
              print(f"error: JaCoCo report not found at {report}", file=sys.stderr)
              sys.exit(1)

          root = ET.parse(report).getroot()
          counters = {c.get("type"): c for c in root.findall("counter")}
          line = counters.get("LINE")
          if line is None:
              print("error: LINE counter missing from JaCoCo report", file=sys.stderr)
              sys.exit(1)

          missed = int(line.get("missed", "0"))
          covered = int(line.get("covered", "0"))
          total = missed + covered
          percent = 0.0 if total == 0 else (covered / total) * 100.0
          passed = percent >= min_cov

          with open(github_output, "a", encoding="utf-8") as out:
              out.write(f"coverage_percent={percent:.2f}\n")
              out.write(f"coverage_pass={'true' if passed else 'false'}\n")
              out.write(f"lines_covered={covered}\n")
              out.write(f"lines_missed={missed}\n")

          print(f"Line coverage: {percent:.2f}% ({covered}/{total} lines)")

          if not passed:
              if skip_gate:
                  print(
                      f"Coverage below minimum {min_cov}% — gate skipped for this run.",
                      file=sys.stderr,
                  )
              else:
                  print(f"Coverage below minimum {min_cov}%", file=sys.stderr)
                  sys.exit(1)
          PY
        env:
          MIN_COVERAGE_PERCENT: ${{ env.MIN_COVERAGE_PERCENT }}
          SKIP_COVERAGE_GATE: ${{ needs.resolve-pr.outputs.skip_coverage }}

      - name: Post quality gate summary on pull request
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.resolve-pr.outputs.pr_number }}
          SKIP_COVERAGE: ${{ needs.resolve-pr.outputs.skip_coverage }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const skipCoverage = process.env.SKIP_COVERAGE === 'true';
            const testsPass = '${{ steps.coverage.outputs.tests_pass }}' === 'true';
            const coveragePass = '${{ steps.coverage.outputs.coverage_pass }}' === 'true';
            const coveragePercent = '${{ steps.coverage.outputs.coverage_percent }}' || 'n/a';
            const linesCovered = '${{ steps.coverage.outputs.lines_covered }}' || 'n/a';
            const linesMissed = '${{ steps.coverage.outputs.lines_missed }}' || 'n/a';
            const minCoverage = '${{ env.MIN_COVERAGE_PERCENT }}';

            const coverageResult = skipCoverage
              ? 'SKIP'
              : (coveragePass ? 'PASS' : 'FAIL');
            const coverageDetails = skipCoverage
              ? `**${coveragePercent}%** (min **${minCoverage}%**) — gate skipped manually — ${linesCovered} covered / ${linesMissed} missed`
              : `**${coveragePercent}%** (min **${minCoverage}%**) — ${linesCovered} covered / ${linesMissed} missed`;

            const body = [
              '## Agent PR quality gates',
              '',
              'Automated checks ran before requesting **Copilot Code Review**.',
              skipCoverage ? '',
              skipCoverage ? '> Coverage gate was **skipped** for this workflow run (`skip_coverage=true`).' : '',
              skipCoverage ? '' : null,
              '| Gate | Result | Details |',
              '|------|--------|---------|',
              `| Unit tests (\`mvn test\`) | ${testsPass ? 'PASS' : 'FAIL'} | Spring Boot / JUnit 5 in \`java-app\` |`,
              `| Line coverage (JaCoCo) | ${coverageResult} | ${coverageDetails} |`,
              '',
              '### Review focus for Copilot',
              '',
              '1. **Maintenance / stability** — prioritize safe, minimal changes; no regressions.',
              '2. **Repository code standards** — Java 17, Spring Boot 3.2, JUnit 5, existing package layout.',
              '3. **Reuse / DRY** — flag duplicated logic; prefer existing utilities and patterns.',
              `4. **Test coverage** — require **≥ ${minCoverage}%** line coverage on changed production code.`,
              '5. **Security** — block known vulnerabilities (Semgrep, OWASP, unsafe dependencies).',
              '',
              'See `.github/copilot-instructions.md` and `.github/skills/code-review/SKILL.md` for full criteria.',
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].filter((line) => line !== null).join('\n');

            const marker = '<!-- agent-pr-quality-gates -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((c) =>
              c.user?.type === 'Bot' && c.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: `${marker}\n${body}`,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `${marker}\n${body}`,
              });
            }

  request-copilot-review:
    name: Request Copilot Code Review
    needs: [resolve-pr, quality-gates]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      always() &&
      needs.resolve-pr.outputs.should_run == 'true' &&
      needs.quality-gates.result != 'cancelled'

    steps:
      - name: Request Copilot as pull request reviewer
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.resolve-pr.outputs.pr_number }}
          COPILOT_REVIEWER: ${{ env.COPILOT_REVIEWER }}
        with:
          script: |
            const reviewer = process.env.COPILOT_REVIEWER;
            const prNumber = Number(process.env.PR_NUMBER);

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers: [reviewer],
              });
              core.info(`Requested review from ${reviewer} on PR #${prNumber}`);
            } catch (error) {
              const message = String(error?.message || error);
              if (
                message.includes('already') ||
                message.includes('422') ||
                message.includes('not found')
              ) {
                core.warning(`Could not add ${reviewer}: ${message}`);
                core.warning(
                  'Ensure Copilot code review is enabled for this account or organization.',
                );
              } else {
                throw error;
              }
            }

      - name: Review request summary
        if: always()
        run: |
          {
            echo "## Copilot review requested"
            echo ""
            echo "- Pull request: #${{ needs.resolve-pr.outputs.pr_number }}"
            echo "- Branch: \`${{ needs.resolve-pr.outputs.head_ref }}\`"
            echo "- Reviewer: \`${{ env.COPILOT_REVIEWER }}\`"
            echo "- Quality gates: **${{ needs.quality-gates.result }}**"
            echo "- Coverage: **${{ needs.quality-gates.outputs.coverage_percent }}%** (min ${{ env.MIN_COVERAGE_PERCENT }}%)"
            if [ "${{ needs.resolve-pr.outputs.skip_coverage }}" = "true" ]; then
              echo "- Coverage gate: **skipped** (manual run)"
            fi
            echo ""
            echo "Copilot will post review comments on the pull request timeline."
          } >> "$GITHUB_STEP_SUMMARY"
