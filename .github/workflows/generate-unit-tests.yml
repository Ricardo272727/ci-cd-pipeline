# Generates JUnit 5 tests for java-app sources using the GitHub Copilot SDK
# (preferred) or OpenAI as a fallback.
#
# Copilot auth (pick one):
#   - permissions.copilot-requests: write  → uses GITHUB_TOKEN (org Copilot billing)
#   - secrets.COPILOT_GITHUB_TOKEN         → fine-grained PAT with Copilot Requests
#
# OpenAI fallback: set secrets.OPENAI_API_KEY and workflow input provider=openai
name: Generate Unit Tests

on:
  workflow_dispatch:
    inputs:
      provider:
        description: AI provider (auto, copilot, or openai)
        required: true
        default: auto
        type: choice
        options:
          - auto
          - copilot
          - openai
      force:
        description: Regenerate tests even when test files already exist
        required: false
        default: false
        type: boolean
      create_pr:
        description: Open a pull request with generated tests
        required: true
        default: true
        type: boolean
  push:
    branches: [main, develop]
    paths:
      - "java-app/src/main/java/**"
      - "github-actions/scripts/generate_unit_tests.py"
      - ".github/workflows/generate-unit-tests.yml"

env:
  JAVA_APP_DIR: java-app
  PYTHON_VERSION: "3.12"

concurrency:
  group: generate-unit-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  copilot-requests: write

jobs:
  generate-tests:
    name: Generate Java Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: github-actions/requirements-generate-tests.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r github-actions/requirements-generate-tests.txt

      - name: Generate unit tests
        id: generate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COPILOT_MODEL: ${{ vars.COPILOT_MODEL || 'gpt-4.1' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi

          PROVIDER="${{ github.event_name == 'workflow_dispatch' && inputs.provider || 'auto' }}"

          python github-actions/scripts/generate_unit_tests.py \
            --java-app-dir "${JAVA_APP_DIR}" \
            --provider "${PROVIDER}" \
            --output-summary "${RUNNER_TEMP}/generation-summary.json" \
            ${FORCE_FLAG} | tee "${RUNNER_TEMP}/generation.log"

          CHANGED=$(python -c "import json; print('true' if json.load(open('${RUNNER_TEMP}/generation-summary.json'))['changed'] else 'false')")
          echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"

      - name: Verify generated tests compile
        if: steps.generate.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run Maven test compile
        if: steps.generate.outputs.changed == 'true'
        working-directory: ${{ env.JAVA_APP_DIR }}
        run: mvn -B test-compile

      - name: Create pull request
        if: >-
          steps.generate.outputs.changed == 'true' &&
          (github.event_name != 'workflow_dispatch' || inputs.create_pr == true)
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(tests): generate unit tests with Copilot"
          title: "chore(tests): auto-generate Java unit tests"
          body: |
            ## Summary
            - Generated JUnit 5 unit tests for `java-app` source files missing tests.
            - Provider: see workflow run logs (`generate_unit_tests.py` summary JSON).
            - Triggered by: `${{ github.event_name }}` on `${{ github.ref_name }}`.

            ## Test plan
            - [ ] Review generated test assertions and naming
            - [ ] Run `mvn test` locally
            - [ ] Merge if coverage and behavior look correct
          branch: copilot/generated-unit-tests-${{ github.run_id }}
          delete-branch: true
          labels: |
            tests
            automated

      - name: Commit directly to branch
        if: >-
          steps.generate.outputs.changed == 'true' &&
          github.event_name == 'workflow_dispatch' &&
          inputs.create_pr == false
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${JAVA_APP_DIR}/src/test/java"
          git commit -m "chore(tests): generate unit tests with Copilot"
          git push

      - name: Generation summary
        if: always()
        run: |
          if [ -f "${RUNNER_TEMP}/generation-summary.json" ]; then
            cat "${RUNNER_TEMP}/generation-summary.json"
          else
            echo "No summary file produced."
          fi
